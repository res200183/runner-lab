name: Runner Lab

on:
  push:
    branches:
      - main

jobs:
  test-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Debug info
        run: |
          whoami
          uname -a
          python3 --version

      - name: Run python file
        run: python3 app.py
